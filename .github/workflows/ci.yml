name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 后端接口测试 (Vitest)
        run: npm test
        env:
          TEST_MODE: 1

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 端到端测试 (Playwright)
        run: npm run test:e2e
